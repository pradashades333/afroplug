name: Build Soul FX

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── macOS — VST3 + AU + .pkg installer ───────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DAFROPLUG_COPY_AFTER_BUILD=OFF \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"

      - name: Build VST3
        run: cmake --build build --config Release --target Afroplug_VST3 -j$(sysctl -n hw.ncpu)

      - name: Build AU
        run: cmake --build build --config Release --target Afroplug_AU -j$(sysctl -n hw.ncpu)

      - name: Ad-hoc sign VST3
        run: |
          VST3=$(find build -name "*.vst3" -type d | head -1)
          echo "Found VST3: $VST3"
          codesign --force --deep --sign - "$VST3"

      - name: Ad-hoc sign AU
        run: |
          AU=$(find build -name "*.component" -type d | head -1)
          echo "Found AU: $AU"
          codesign --force --deep --sign - "$AU"

      - name: Build .pkg installer
        run: |
          set -e
          VST3=$(find build -name "*.vst3"      -type d | head -1)
          AU=$(find   build -name "*.component" -type d | head -1)
          echo "VST3: $VST3"
          echo "AU:   $AU"

          mkdir -p pkg_stage/vst3/Library/Audio/Plug-Ins/VST3
          mkdir -p pkg_stage/au/Library/Audio/Plug-Ins/Components
          cp -R "$VST3" "pkg_stage/vst3/Library/Audio/Plug-Ins/VST3/"
          cp -R "$AU"   "pkg_stage/au/Library/Audio/Plug-Ins/Components/"

          pkgbuild --root pkg_stage/vst3 \
                   --identifier com.afroplug.soulfx.vst3 \
                   --version 1.0.0 \
                   --install-location / \
                   SoulFX-VST3.pkg

          pkgbuild --root pkg_stage/au \
                   --identifier com.afroplug.soulfx.au \
                   --version 1.0.0 \
                   --install-location / \
                   SoulFX-AU.pkg

          python3 - << 'PYEOF'
          import textwrap, pathlib
          pathlib.Path("distribution.xml").write_text(textwrap.dedent("""
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
            <title>Soul FX by Afroplug</title>
            <welcome file="welcome.html" mime-type="text/html"/>
            <license file="license.html" mime-type="text/html"/>
            <options customize="never" require-scripts="false" hostArchitectures="arm64,x86_64"/>
            <choices-outline>
              <line choice="vst3"/>
              <line choice="au"/>
            </choices-outline>
            <choice id="vst3" title="VST3 Plugin"
                    description="Installs Soul FX VST3 to /Library/Audio/Plug-Ins/VST3">
              <pkg-ref id="com.afroplug.soulfx.vst3"/>
            </choice>
            <choice id="au" title="Audio Unit Plugin"
                    description="Installs Soul FX AU to /Library/Audio/Plug-Ins/Components">
              <pkg-ref id="com.afroplug.soulfx.au"/>
            </choice>
            <pkg-ref id="com.afroplug.soulfx.vst3" version="1.0.0">SoulFX-VST3.pkg</pkg-ref>
            <pkg-ref id="com.afroplug.soulfx.au"   version="1.0.0">SoulFX-AU.pkg</pkg-ref>
          </installer-gui-script>
          """).strip())
          PYEOF

          productbuild \
            --distribution distribution.xml \
            --resources Installer \
            --package-path . \
            "SoulFX-macOS-Installer.pkg"

          ls -lh SoulFX-macOS-Installer.pkg

      - name: Upload macOS Installer (.pkg)
        uses: actions/upload-artifact@v4
        with:
          name: SoulFX-macOS-Installer
          path: SoulFX-macOS-Installer.pkg

  # ── Windows — VST3 only ───────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DAFROPLUG_COPY_AFTER_BUILD=OFF

      - name: Build VST3
        run: cmake --build build --config Release --target Afroplug_VST3

      - name: Package VST3
        shell: bash
        run: |
          VST3=$(find build -name "*.vst3" -type d | head -1)
          VNAME=$(basename "$VST3")
          echo "Found VST3: $VST3"
          cd "$(dirname "$VST3")"
          7z a "$GITHUB_WORKSPACE/SoulFX-Windows-VST3.zip" "$VNAME"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SoulFX-Windows-VST3
          path: SoulFX-Windows-VST3.zip

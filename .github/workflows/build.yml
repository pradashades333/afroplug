name: Build Soul FX

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── macOS — VST3 + AU (Universal binary: arm64 + x86_64) ─────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DAFROPLUG_COPY_AFTER_BUILD=OFF \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"

      - name: Build VST3
        run: cmake --build build --config Release --target Afroplug_VST3 -j$(sysctl -n hw.ncpu)

      - name: Build AU
        run: cmake --build build --config Release --target Afroplug_AU -j$(sysctl -n hw.ncpu)

      - name: Ad-hoc sign VST3
        run: |
          VST3=$(find build -name "Soul FX.vst3" -type d | head -1)
          codesign --force --deep --sign - --options runtime "$VST3"
          echo "Signed: $VST3"

      - name: Ad-hoc sign AU
        run: |
          AU=$(find build -name "Soul FX.component" -type d | head -1)
          codesign --force --deep --sign - --options runtime "$AU"
          echo "Signed: $AU"

      - name: Package VST3
        run: |
          VST3=$(find build -name "Soul FX.vst3" -type d | head -1)
          cd "$(dirname "$VST3")"
          zip -r "$GITHUB_WORKSPACE/SoulFX-macOS-VST3.zip" "Soul FX.vst3"

      - name: Package AU
        run: |
          AU=$(find build -name "Soul FX.component" -type d | head -1)
          cd "$(dirname "$AU")"
          zip -r "$GITHUB_WORKSPACE/SoulFX-macOS-AU.zip" "Soul FX.component"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SoulFX-macOS-VST3
          path: SoulFX-macOS-VST3.zip

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: SoulFX-macOS-AU
          path: SoulFX-macOS-AU.zip

  # ── Windows — VST3 only ───────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DAFROPLUG_COPY_AFTER_BUILD=OFF

      - name: Build VST3
        run: cmake --build build --config Release --target Afroplug_VST3

      - name: Package VST3
        shell: bash
        run: |
          VST3=$(find build -name "Soul FX.vst3" -type d | head -1)
          cd "$(dirname "$VST3")"
          7z a "$GITHUB_WORKSPACE/SoulFX-Windows-VST3.zip" "Soul FX.vst3"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: SoulFX-Windows-VST3
          path: SoulFX-Windows-VST3.zip

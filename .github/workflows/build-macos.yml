name: Build Afroplug (macOS VST3 + AU)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
            -DAFROPLUG_COPY_AFTER_BUILD=OFF

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Ad-hoc sign VST3
        run: |
          VST3_PATH=$(find build -name "Afroplug.vst3" -type d | head -1)
          if [ -n "$VST3_PATH" ]; then
            codesign --force --deep --sign - --options runtime "$VST3_PATH"
            echo "Signed: $VST3_PATH"
          fi

      - name: Ad-hoc sign AU
        run: |
          AU_PATH=$(find build -name "Afroplug.component" -type d | head -1)
          if [ -n "$AU_PATH" ]; then
            codesign --force --deep --sign - --options runtime "$AU_PATH"
            echo "Signed: $AU_PATH"
          fi

      - name: Package VST3
        run: |
          VST3_PATH=$(find build -name "Afroplug.vst3" -type d | head -1)
          if [ -n "$VST3_PATH" ]; then
            cd "$(dirname "$VST3_PATH")"
            zip -r "$GITHUB_WORKSPACE/Afroplug-macOS-VST3.zip" "Afroplug.vst3"
          fi

      - name: Package AU
        run: |
          AU_PATH=$(find build -name "Afroplug.component" -type d | head -1)
          if [ -n "$AU_PATH" ]; then
            cd "$(dirname "$AU_PATH")"
            zip -r "$GITHUB_WORKSPACE/Afroplug-macOS-AU.zip" "Afroplug.component"
          fi

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Afroplug-macOS-VST3
          path: Afroplug-macOS-VST3.zip

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: Afroplug-macOS-AU
          path: Afroplug-macOS-AU.zip
          if-no-files-found: ignore

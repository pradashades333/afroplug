<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soul FX — All Mode Icons</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d12; font-family: 'SF Mono', 'Consolas', monospace;
         color: #f0f0f0; display: flex; flex-direction: column;
         align-items: center; padding: 40px 24px; gap: 40px; }
  h2 { font-size: 11px; letter-spacing: 4px; color: #444455; text-transform: uppercase; }
  .row { display: flex; gap: 20px; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 10px;
          padding: 20px 16px; background: #0d0d0d; border: 1px solid #1a1a1a;
          border-radius: 6px; width: 100px; }
  .label { font-size: 9px; letter-spacing: 3px; color: #666677; text-transform: uppercase; }
</style>
</head>
<body>

<h2>EQ Modes — Red</h2>
<div class="row">
  <!-- Low Cut -->
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <path d="M 3,28 C 9,28 13,12 18,12 L 37,12"
            fill="none" stroke="#f25050" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="label">Low Cut</div>
  </div>
  <!-- High Cut -->
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <path d="M 3,12 L 22,12 C 27,12 31,28 37,28"
            fill="none" stroke="#f25050" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="label">High Cut</div>
  </div>
  <!-- Vocal -->
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <rect x="14" y="6" width="12" height="18" rx="6"
            fill="none" stroke="#f25050" stroke-width="1.8"/>
      <line x1="20" y1="24" x2="20" y2="30" stroke="#f25050" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="13" y1="30" x2="27" y2="30" stroke="#f25050" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <div class="label">Vocal</div>
  </div>
  <!-- Radio -->
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <path d="M 3,28 C 9,28 13,7 20,7 C 27,7 31,28 37,28"
            fill="none" stroke="#f25050" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="label">Radio</div>
  </div>
  <!-- Underwater -->
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <path d="M 4,14 C 12,8 16,20 24,14 C 32,8 36,20 37,14"
            fill="none" stroke="#f25050" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M 4,21 C 12,15 16,27 24,21 C 32,15 36,27 37,21"
            fill="none" stroke="#f25050" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M 4,28 C 12,22 16,34 24,28 C 32,22 36,34 37,28"
            fill="none" stroke="#f25050" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="label">Underwater</div>
  </div>
</div>

<h2>Tone Modes — Cyan</h2>
<div class="row">
  <!-- Clear -->
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <!-- Arrow pointing right -->
      <line x1="6" y1="20" x2="28" y2="20" stroke="#00ccff" stroke-width="2" stroke-linecap="round"/>
      <polygon points="34,20 26,15 26,25" fill="#00ccff"/>
    </svg>
    <div class="label">Clear</div>
  </div>
  <!-- Tape -->
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <circle cx="11" cy="16" r="7" fill="none" stroke="#00ccff" stroke-width="1.8"/>
      <circle cx="11" cy="16" r="2" fill="#00ccff"/>
      <circle cx="29" cy="16" r="7" fill="none" stroke="#00ccff" stroke-width="1.8"/>
      <circle cx="29" cy="16" r="2" fill="#00ccff"/>
      <polyline points="11,23 11,32 29,32 29,23"
                fill="none" stroke="#00ccff" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
    <div class="label">Tape</div>
  </div>
  <!-- Tube -->
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <path d="M 10,30 L 10,16 Q 10,7 20,7 Q 30,7 30,16 L 30,30"
            fill="none" stroke="#00ccff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="14" r="4" fill="none" stroke="#00ccff" stroke-width="1.5"/>
      <line x1="14" y1="30" x2="14" y2="36" stroke="#00ccff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="20" y1="30" x2="20" y2="36" stroke="#00ccff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="26" y1="30" x2="26" y2="36" stroke="#00ccff" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <div class="label">Tube</div>
  </div>
  <!-- Console -->
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <line x1="20" y1="5" x2="20" y2="35" stroke="#00ccff" stroke-width="1.5"/>
      <line x1="23" y1="9"  x2="28" y2="9"  stroke="#00ccff" stroke-width="1.2"/>
      <line x1="23" y1="16" x2="28" y2="16" stroke="#00ccff" stroke-width="1.2"/>
      <line x1="23" y1="23" x2="28" y2="23" stroke="#00ccff" stroke-width="1.2"/>
      <line x1="23" y1="30" x2="28" y2="30" stroke="#00ccff" stroke-width="1.2"/>
      <rect x="11" y="17" width="18" height="8" rx="2.5" fill="#00ccff"/>
    </svg>
    <div class="label">Console</div>
  </div>
  <!-- Grit -->
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <polyline points="3,12 3,12 11,12 11,28 20,28 20,12 29,12 29,28 37,28"
                fill="none" stroke="#00ccff" stroke-width="2"
                stroke-linejoin="miter" stroke-linecap="square"/>
    </svg>
    <div class="label">Grit</div>
  </div>
</div>

<h2>Reverb Modes — Purple</h2>
<div class="row">
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <rect x="5" y="5" width="30" height="30" rx="5" fill="none" stroke="#aa77ee" stroke-width="1.8"/>
      <rect x="14.5" y="14.5" width="11" height="11" fill="#aa77ee"/>
    </svg>
    <div class="label">Studio</div>
  </div>
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <polygon points="13,8 35,8 27,32 5,32" fill="none" stroke="#aa77ee" stroke-width="1.8" stroke-linejoin="round"/>
      <circle cx="13" cy="8" r="3" fill="none" stroke="#aa77ee" stroke-width="1.5"/>
      <circle cx="35" cy="8" r="3" fill="none" stroke="#aa77ee" stroke-width="1.5"/>
    </svg>
    <div class="label">Plate</div>
  </div>
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <polygon points="20,3 34.74,11.5 34.74,28.5 20,37 5.26,28.5 5.26,11.5" fill="none" stroke="#aa77ee" stroke-width="1.8" stroke-linejoin="round"/>
      <polygon points="20,10 28.66,15 28.66,25 20,30 11.34,25 11.34,15" fill="none" stroke="#aa77ee" stroke-width="1.4" stroke-linejoin="round"/>
    </svg>
    <div class="label">Chamber</div>
  </div>
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <path d="M 5,34 A 15,15 0 0,0 35,34" fill="none" stroke="#aa77ee" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M 10,34 A 10,10 0 0,0 30,34" fill="none" stroke="#aa77ee" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M 15,34 A 5,5 0 0,0 25,34" fill="none" stroke="#aa77ee" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <div class="label">Hall</div>
  </div>
  <div class="card">
    <svg width="60" height="60" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="17" fill="none" stroke="#aa77ee" stroke-width="1.5" stroke-dasharray="4 3.35"/>
      <circle cx="20" cy="20" r="10" fill="none" stroke="#aa77ee" stroke-width="1.5" stroke-dasharray="3 2.71"/>
      <circle cx="20" cy="20" r="3.5" fill="#aa77ee"/>
    </svg>
    <div class="label">Abyss</div>
  </div>
</div>

</body>
</html>
